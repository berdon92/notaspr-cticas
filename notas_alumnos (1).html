        function searchGrade() {
            const inputRaw = document.getElementById('nifInput').value;
            // Limpiamos la entrada tal como hicimos al encriptar
            const input = inputRaw.replace(/\s+/g, '').toUpperCase();
            const resultContainer = document.getElementById('resultContainer');
            
            if (!input) {
                showResultError("Por favor, introduce tu NIF para consultar las notas.");
                return;
            }

            let foundStudent = null;

            // El sistema intenta desencriptar los datos. 
            // Solo tendrá éxito en el bloque que se cerró con su NIF.
            for (let i = 0; i < encryptedData.length; i++) {
                try {
                    const bytes = CryptoJS.AES.decrypt(encryptedData[i], input);
                    const decryptedStr = bytes.toString(CryptoJS.enc.Utf8);
                    if (decryptedStr) {
                        const student = JSON.parse(decryptedStr);
                        // Doble comprobación de seguridad
                        if (student.nif === input) {
                            foundStudent = student;
                            break;
                        }
                    }
                } catch (e) {
                    // Ignora si falla (significa que esa no era su nota)
                }
            }

            if (foundStudent) {
                renderStudentData(foundStudent);
            } else {
                showResultError("No se ha encontrado ningún alumno con el NIF: <b>" + inputRaw + "</b>. Verifica que esté bien escrito.");
            }
        }

        function renderStudentData(student) {
            const resultContainer = document.getElementById('resultContainer');
            
            let notaFinalStr = student.final.toLowerCase().trim();
            let finalMessage = '';
            let finalMessageClass = '';
            let finalMessageIcon = '';

            if (notaFinalStr.includes('no aplica')) {
                finalMessageClass = 'bg-blue-50 text-blue-800 border-blue-200';
                finalMessageIcon = 'ph-info';
                finalMessage = 'El examen de este alumno será <b>teórico-práctico sobre 7 puntos</b>.';
            } else {
                let numericGrade = parseFloat(student.final.replace(',', '.'));
                if (!isNaN(numericGrade)) {
                    if (numericGrade > 4.9) {
                        finalMessageClass = 'bg-green-50 text-green-800 border-green-200';
                        finalMessageIcon = 'ph-confetti text-green-600';
                        finalMessage = '<span class="font-bold text-lg">¡Enhorabuena!</span><br>Has superado satisfactoriamente la parte práctica.';
                    } else {
                        finalMessageClass = 'bg-orange-50 text-orange-800 border-orange-200';
                        finalMessageIcon = 'ph-warning-circle text-orange-600';
                        finalMessage = '<span class="font-bold">Ánimo para la segunda convocatoria.</span><br>Sigue esforzándote, ¡tú puedes!';
                    }
                } else {
                    finalMessageClass = 'bg-gray-50 text-gray-800 border-gray-200';
                    finalMessageIcon = 'ph-file-text';
                    finalMessage = 'Consulta las observaciones para más información.';
                }
            }

            let obsHtml = '';
            if (student.obs) {
                obsHtml = '<div class="mt-4 p-3 bg-yellow-50 text-yellow-800 rounded-lg text-sm border border-yellow-200">' +
                            '<strong><i class="ph ph-chat-text mr-1"></i> Observaciones:</strong> ' + student.obs +
                            '</div>';
            }

            let html = '<div class="border border-gray-200 rounded-xl overflow-hidden bg-white shadow-sm">' +
                '<div class="bg-gray-50 px-5 py-4 border-b border-gray-200 flex justify-between items-center">' +
                    '<div>' +
                        '<p class="text-xs text-gray-500 uppercase tracking-wider font-semibold mb-1">Alumno</p>' +
                        '<p class="font-bold text-gray-800">' + student.alumno + '</p>' +
                    '</div>' +
                    '<div class="text-right">' +
                        '<p class="text-xs text-gray-500 uppercase tracking-wider font-semibold mb-1">NIF</p>' +
                        '<p class="text-gray-700 font-mono">' + student.nif + '</p>' +
                    '</div>' +
                '</div>' +
                '<div class="p-5">' +
                    '<table class="w-full text-sm text-left text-gray-600">' +
                        '<thead class="text-xs text-gray-500 uppercase bg-gray-50">' +
                            '<tr>' +
                                '<th class="px-4 py-2 rounded-tl-lg">Práctica</th>' +
                                '<th class="px-4 py-2 text-right rounded-tr-lg">Nota</th>' +
                            '</tr>' +
                        '</thead>' +
                        '<tbody>' +
                            '<tr class="border-b"><td class="px-4 py-2">Práctica 1</td><td class="px-4 py-2 text-right font-medium">' + student.p1 + '</td></tr>' +
                            '<tr class="border-b"><td class="px-4 py-2">Práctica 2</td><td class="px-4 py-2 text-right font-medium">' + student.p2 + '</td></tr>' +
                            '<tr class="border-b"><td class="px-4 py-2">Práctica 3</td><td class="px-4 py-2 text-right font-medium">' + student.p3 + '</td></tr>' +
                            '<tr class="border-b"><td class="px-4 py-2">Práctica 4</td><td class="px-4 py-2 text-right font-medium">' + student.p4 + '</td></tr>' +
                            '<tr class="border-b"><td class="px-4 py-2">Práctica 5</td><td class="px-4 py-2 text-right font-medium">' + student.p5 + '</td></tr>' +
                            '<tr class="border-b"><td class="px-4 py-2">Práctica 6</td><td class="px-4 py-2 text-right font-medium">' + student.p6 + '</td></tr>' +
                        '</tbody>' +
                        '<tfoot>' +
                            '<tr class="bg-gray-100 font-bold text-gray-900 text-base">' +
                                '<td class="px-4 py-3 rounded-bl-lg">Nota total de las prácticas</td>' +
                                '<td class="px-4 py-3 text-right rounded-br-lg">' + student.final + '</td>' +
                            '</tr>' +
                        '</tfoot>' +
                    '</table>' +
                    obsHtml +
                    '<div class="mt-5 p-4 rounded-xl border ' + finalMessageClass + ' flex items-start gap-3">' +
                        '<i class="ph ' + finalMessageIcon + ' text-2xl mt-0.5"></i>' +
                        '<div>' + finalMessage + '</div>' +
                    '</div>' +
                '</div>' +
            '</div>';
            
            resultContainer.innerHTML = html;
            resultContainer.classList.remove('hidden');
        }

        function showResultError(message) {
            const resultContainer = document.getElementById('resultContainer');
            resultContainer.innerHTML = '<div class="bg-red-50 text-red-600 p-4 rounded-lg flex items-center gap-3 border border-red-200">' +
                    '<i class="ph ph-warning-octagon text-2xl"></i>' +
                    '<span>' + message + '</span>' +
                '</div>';
            resultContainer.classList.remove('hidden');
        }

        document.getElementById('nifInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') searchGrade();
        });
    </script>
